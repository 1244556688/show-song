<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Infinity | Auto-Pilot Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020205;
            --primary: #bc13fe;
            --secondary: #00f0ff;
            --accent: #ff007a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -2; }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: -1;
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,240,255,0.5));
        }

        main {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 25px;
            padding: 0 30px 20px;
            flex: 1;
            perspective: 1000px;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .track-card {
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        .track-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .track-card.active {
            background: rgba(161, 52, 255, 0.15);
            border-left-color: var(--secondary);
            box-shadow: inset 0 0 15px rgba(0,240,255,0.1);
        }

        .visual-core { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sphere-wrapper { position: relative; width: 260px; height: 260px; margin-bottom: 30px; }
        .sphere {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--secondary), var(--primary), #000);
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.5);
            transition: transform 0.1s ease;
        }

        .lyrics-box {
            width: 100%; height: 200px; overflow: hidden; position: relative;
            mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent);
        }
        .lyric-item {
            font-size: 18px; color: rgba(255,255,255,0.2);
            padding: 12px 0; text-align: center; transition: all 0.4s;
        }
        .lyric-item.active { color: #fff; transform: scale(1.15); text-shadow: 0 0 15px var(--secondary); }

        .play-main {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; transition: 0.3s;
        }
        .play-main:hover { transform: scale(1.1); filter: brightness(1.2); }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--secondary); border-radius: 50%; cursor: pointer;}

        .vis-footer { height: 70px; width: 100%; padding: 0 30px 10px; }
        #vis-canvas { width: 100%; height: 100%; opacity: 0.7; }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="scanlines"></div>

    <header>
        <div class="brand">
            <h1>SUNO INFINITY</h1>
            <div id="repo-name" style="font-size: 9px; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase;">SCANNING REPOSITORY...</div>
        </div>
        <div id="status-tag" style="font-size: 11px; color: var(--accent); font-family: 'Orbitron';">AUTO_SYNC_ENABLED</div>
    </header>

    <main id="tilt-container">
        <aside class="panel">
            <h3 style="margin-bottom: 20px; font-family: 'Orbitron'; font-size: 12px; color: var(--secondary);">DB_PLAYLIST</h3>
            <div id="list-container" style="overflow-y:auto; flex:1">
                <div style="color:rgba(255,255,255,0.3); font-size:12px;">Connecting to GitHub...</div>
            </div>
        </aside>

        <section class="visual-core">
            <div class="sphere-wrapper">
                <div class="sphere" id="sphere"></div>
            </div>
            <h2 id="song-title" style="font-size: 20px; margin-bottom: 10px; text-align: center;">Initializing...</h2>
            <div class="lyrics-box">
                <div id="lyric-scroll" style="transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1)"></div>
            </div>
        </section>

        <aside class="panel">
            <h3 style="margin-bottom: 30px; font-family: 'Orbitron'; font-size: 12px; color: var(--secondary);">CORE_COMMAND</h3>
            <button class="play-main" id="play-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" id="p-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px; color:rgba(255,255,255,0.5)">
                <span id="cur-time">00:00</span>
                <span id="dur-time">00:00</span>
            </div>
            <input type="range" id="seek-bar" value="0">
            <div style="margin-top:30px;">
                <label style="font-size:9px; color:var(--secondary); letter-spacing:1px;">OUTPUT_GAIN</label>
                <input type="range" id="vol-bar" min="0" max="1" step="0.01" value="0.8">
            </div>
        </aside>
    </main>

    <footer class="vis-footer">
        <canvas id="vis-canvas"></canvas>
    </footer>

    <script>
        const audio = new Audio();
        let audioCtx, analyser, dataArray, curIdx = 0, currentLyrics = [];
        let playlist = [];

        // --- 核心：自動偵測 GitHub 路徑 ---
        async function initAutoPilot() {
            // 從網址列解析：https://[user].github.io/[repo]/
            const pathParts = window.location.pathname.split('/').filter(p => p);
            const hostParts = window.location.hostname.split('.');
            
            let user = hostParts[0];
            let repo = pathParts[0] || "";

            // 如果是在本地測試，請在此手動填入你的資訊以供預覽1
            if(window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost") {
                user = "你的GitHub帳號"; 
                repo = "你的專案名稱";
            }

            document.getElementById('repo-name').innerText = `DATA_STREAM: ${user}/${repo}`;
            
            try {
                const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/music`;
                const response = await fetch(apiUrl);
                if(!response.ok) throw new Error("Music folder not found");
                
                const files = await response.json();
                const mp3s = files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                
                playlist = mp3s.map(f => {
                    const base = f.name.replace(/\.[^/.]+$/, "");
                    return {
                        name: base,
                        url: f.download_url,
                        lrcUrl: files.find(l => l.name === base + ".lrc")?.download_url || null
                    };
                });

                if(playlist.length > 0) {
                    renderList();
                    await loadTrack(0, false);
                    document.getElementById('status-tag').innerText = "SYNC_COMPLETE";
                } else {
                    document.getElementById('song-title').innerText = "Folder /music is empty";
                }
            } catch (e) {
                document.getElementById('song-title').innerText = "GitHub API Error";
                console.error(e);
            }
        }

        // --- 基礎功能函數 ---
        window.onload = () => {
            initStars();
            initAutoPilot();
        };

        async function loadTrack(index, autoPlay = true) {
            curIdx = index;
            const track = playlist[index];
            audio.src = track.url;
            document.getElementById('song-title').innerText = track.name;
            
            currentLyrics = []; // 先清空歌詞
            if (track.lrcUrl) {
                try {
                    const res = await fetch(track.lrcUrl);
                    const text = await res.text();
                    currentLyrics = parseLRC(text);
                } catch (e) { console.warn("LRC Load Failed"); }
            }
            
            renderLyrics();
            renderList();
            if(autoPlay) playToggle(true);
        }

        function parseLRC(lrc) {
            return lrc.split('\n').map(line => {
                const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), txt: m[3].trim() } : null;
            }).filter(x => x && x.txt);
        }

        function playToggle(forcePlay = false) {
            if(!audioCtx) initAudio();
            if(audio.paused || forcePlay) {
                audio.play();
                document.getElementById('p-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                document.getElementById('p-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            drawVis();
        }

        function renderList() {
            const cont = document.getElementById('list-container');
            cont.innerHTML = playlist.map((t, i) => `
                <div class="track-card ${i===curIdx?'active':''}" onclick="loadTrack(${i})">
                    <div style="font-size:9px; color:var(--secondary); opacity:0.6">#${(i+1).toString().padStart(2,'0')}</div>
                    <div style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${t.name}</div>
                </div>
            `).join('');
        }

        function renderLyrics() {
            const scroller = document.getElementById('lyric-scroll');
            scroller.innerHTML = currentLyrics.length > 0 
                ? currentLyrics.map((l, i) => `<div class="lyric-item" id="lrc-${i}">${l.txt}</div>`).join('')
                : `<div class="lyric-item">(Instrumental / No Lyrics)</div>`;
        }

        function drawVis() {
            requestAnimationFrame(drawVis);
            if(!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            const vCanvas = document.getElementById('vis-canvas');
            const vCtx = vCanvas.getContext('2d');
            vCanvas.width = vCanvas.offsetWidth; vCanvas.height = vCanvas.offsetHeight;
            const bw = (vCanvas.width / dataArray.length) * 2;
            
            dataArray.forEach((v, i) => {
                const h = (v/255) * vCanvas.height;
                const g = vCtx.createLinearGradient(0, vCanvas.height, 0, 0);
                g.addColorStop(0, '#bc13fe'); g.addColorStop(1, '#00f0ff');
                vCtx.fillStyle = g;
                vCtx.fillRect(i * (bw+3), vCanvas.height - h, bw, h);
            });

            const bass = dataArray[2];
            document.getElementById('sphere').style.transform = `scale(${1 + (bass/255)*0.25})`;
            document.getElementById('sphere').style.boxShadow = `0 0 ${20 + (bass/255)*60}px rgba(188, 19, 254, 0.6)`;
        }

        function initStars() {
            const bg = document.getElementById('bg-canvas');
            const bCtx = bg.getContext('2d');
            bg.width = window.innerWidth; bg.height = window.innerHeight;
            let p = Array(80).fill().map(() => ({x: Math.random()*bg.width, y: Math.random()*bg.height, r: Math.random()*1.5}));
            function animate() {
                bCtx.fillStyle = '#020205'; bCtx.fillRect(0,0,bg.width,bg.height);
                bCtx.fillStyle = "white";
                p.forEach(s => {
                    s.y -= 0.2; if(s.y < 0) s.y = bg.height;
                    bCtx.globalAlpha = Math.random();
                    bCtx.beginPath(); bCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); bCtx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        document.getElementById('play-btn').onclick = () => playToggle();
        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            document.getElementById('cur-time').innerText = format(cur);
            document.getElementById('dur-time').innerText = format(audio.duration);
            document.getElementById('seek-bar').value = (cur / audio.duration) * 100 || 0;
            
            currentLyrics.forEach((l, i) => {
                if(cur >= l.t && (!currentLyrics[i+1] || cur < currentLyrics[i+1].t)) {
                    document.querySelectorAll('.lyric-item').forEach(el => el.classList.remove('active'));
                    const activeLrc = document.getElementById(`lrc-${i}`);
                    if(activeLrc) {
                        activeLrc.classList.add('active');
                        document.getElementById('lyric-scroll').style.transform = `translateY(${-activeLrc.offsetTop + 70}px)`;
                    }
                }
            });
        };
        function format(s) { return isNaN(s)?"00:00":Math.floor(s/60).toString().padStart(2,'0')+":"+Math.floor(s%60).toString().padStart(2,'0'); }
        document.getElementById('seek-bar').oninput = (e) => audio.currentTime = (e.target.value/100)*audio.duration;
        document.getElementById('vol-bar').oninput = (e) => audio.volume = e.target.value;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNO INFINITY | ULTIMATE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --primary: #bc13fe;
            --secondary: #00f0ff;
            --accent: #ff007a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.2s ease;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -2; }
        
        /* 掃描線特效 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 10;
        }

        header {
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            padding: 0 30px 30px;
            flex: 1;
            perspective: 1200px;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* 歌曲清單 */
        .track-card {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .track-card.active {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--secondary);
        }

        /* 主視覺區 */
        .visual-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .sphere-box {
            position: relative;
            width: 400px; height: 400px;
            display: flex; align-items: center; justify-content: center;
        }

        #ring-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .sphere {
            width: 180px; height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--primary), #000);
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.5);
            z-index: 2;
        }

        /* 歌詞 */
        .lyrics-wrapper {
            height: 150px;
            overflow: hidden;
            mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent);
            margin-top: 20px;
            width: 100%;
        }

        .lyric-line {
            text-align: center;
            font-size: 1.2rem;
            padding: 10px 0;
            color: rgba(255,255,255,0.2);
            transition: 0.4s;
        }
        .lyric-line.active {
            color: var(--secondary);
            transform: scale(1.1);
            text-shadow: 0 0 10px var(--secondary);
        }

        /* 控制器 */
        .btn-play {
            width: 60px; height: 60px;
            border-radius: 50%; border: none;
            background: var(--primary);
            cursor: pointer; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary);
        }

        input[type="range"] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--secondary); border-radius: 50%; }

    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="overlay"></div>

    <header>
        <div class="brand"><h1>SUNO INFINITY</h1></div>
        <div id="status" style="font-family: Orbitron; font-size: 10px; color: var(--secondary);">INITIALIZING...</div>
    </header>

    <main id="main-ui">
        <aside class="panel" id="left-panel">
            <h4 style="font-family: Orbitron; font-size: 12px; color: var(--secondary); margin-bottom: 15px;">PLAYLIST_ARCHIVE</h4>
            <div id="playlist" style="overflow-y: auto; flex: 1;"></div>
        </aside>

        <section class="visual-container">
            <div class="sphere-box">
                <canvas id="ring-canvas"></canvas>
                <div class="sphere" id="core-sphere"></div>
            </div>
            <h2 id="track-name" style="font-family: Orbitron; letter-spacing: 2px;">READY TO PLAY</h2>
            <div class="lyrics-wrapper">
                <div id="lyric-content" style="transition: transform 0.5s ease;"></div>
            </div>
        </section>

        <aside class="panel" id="right-panel">
            <h4 style="font-family: Orbitron; font-size: 12px; color: var(--secondary); margin-bottom: 15px;">COMMAND_CENTER</h4>
            <button class="btn-play" id="play-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" id="p-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <div style="font-size: 12px; text-align: center; margin-bottom: 10px;">
                <span id="time-cur">00:00</span> / <span id="time-dur">00:00</span>
            </div>
            <input type="range" id="seek" value="0" style="width: 100%;">
            
            <div style="margin-top: 40px;">
                <p style="font-size: 10px; color: var(--secondary);">VOLUME_GAIN</p>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" style="width: 100%;">
            </div>
        </aside>
    </main>

    <script>
        const audio = new Audio();
        let audioCtx, analyser, dataArray, playlist = [], curIdx = 0, lyrics = [];

        // 1. 自動讀取 GitHub
        async function autoLoad() {
            const pathParts = window.location.pathname.split('/').filter(p => p);
            const user = window.location.hostname.split('.')[0];
            const repo = pathParts[0] || "";

            // 本地測試用 (若在 GitHub 上會自動覆蓋)
            let finalUser = user, finalRepo = repo;
            if(user === "localhost" || user === "127") { finalUser = "你的帳號"; finalRepo = "你的專案"; }

            try {
                const res = await fetch(`https://api.github.com/repos/${finalUser}/${finalRepo}/contents/music`);
                const files = await res.json();
                const mp3s = files.filter(f => f.name.endsWith('.mp3'));
                
                playlist = mp3s.map(f => {
                    const name = f.name.replace('.mp3','');
                    return {
                        name: name,
                        url: f.download_url,
                        lrc: files.find(l => l.name === name + '.lrc')?.download_url
                    };
                });

                renderList();
                if(playlist.length > 0) loadTrack(0, false);
                document.getElementById('status').innerText = "SYSTEM_ONLINE";
            } catch (e) { document.getElementById('status').innerText = "OFFLINE_MODE"; }
        }

        // 2. 核心播放邏輯
        async function loadTrack(idx, play = true) {
            curIdx = idx;
            const t = playlist[idx];
            audio.src = t.url;
            document.getElementById('track-name').innerText = t.name;
            
            lyrics = [];
            if(t.lrc) {
                const r = await fetch(t.lrc);
                const txt = await r.text();
                lyrics = txt.split('\n').map(l => {
                    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), txt: m[3] } : null;
                }).filter(x => x);
            }
            renderLyrics();
            renderList();
            if(play) playBtnToggle(true);
        }

        function renderList() {
            document.getElementById('playlist').innerHTML = playlist.map((t, i) => `
                <div class="track-card ${i===curIdx?'active':''}" onclick="loadTrack(${i})">
                    <div style="font-size:10px; opacity:0.5">TRACK_${(i+1).toString().padStart(2,'0')}</div>
                    <div>${t.name}</div>
                </div>
            `).join('');
        }

        function renderLyrics() {
            document.getElementById('lyric-content').innerHTML = lyrics.map((l, i) => `
                <div class="lyric-line" id="lrc-${i}">${l.txt}</div>
            `).join('');
        }

        // 3. 視覺化：環狀頻譜
        const ringCanvas = document.getElementById('ring-canvas');
        const ringCtx = ringCanvas.getContext('2d');

        function drawVisuals() {
            requestAnimationFrame(drawVisuals);
            if(!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            const w = ringCanvas.width = 400;
            const h = ringCanvas.height = 400;
            const cx = w/2, cy = h/2;
            ringCtx.clearRect(0,0,w,h);

            const bars = 100;
            const radius = 110;

            for(let i=0; i<bars; i++) {
                const val = dataArray[i % dataArray.length];
                const height = (val / 255) * 60;
                const angle = (i / bars) * Math.PI * 2;
                
                const x1 = cx + Math.cos(angle) * radius;
                const y1 = cy + Math.sin(angle) * radius;
                const x2 = cx + Math.cos(angle) * (radius + height);
                const y2 = cy + Math.sin(angle) * (radius + height);

                ringCtx.strokeStyle = `hsla(${280 + val/5}, 100%, 60%, ${val/255 + 0.2})`;
                ringCtx.lineWidth = 3;
                ringCtx.beginPath();
                ringCtx.moveTo(x1, y1);
                ringCtx.lineTo(x2, y2);
                ringCtx.stroke();
            }

            // 球體縮放與背景連動
            const bass = dataArray[2];
            document.getElementById('core-sphere').style.transform = `scale(${1 + bass/500})`;
            document.body.style.background = `radial-gradient(circle, rgba(188,19,254,${bass/1000}) 0%, #050508 70%)`;
        }

        // 4. 互動：3D Tilt
        document.addEventListener('mousemove', (e) => {
            const rx = (window.innerHeight/2 - e.pageY) / 30;
            const ry = (e.pageX - window.innerWidth/2) / 30;
            document.querySelectorAll('.panel').forEach(p => {
                p.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
            });
        });

        // 5. 事件與啟動
        function playBtnToggle(force = false) {
            if(!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                const src = audioCtx.createMediaElementSource(audio);
                src.connect(analyser); analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                drawVisuals();
            }
            if(audio.paused || force) {
                audio.play();
                document.getElementById('p-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                document.getElementById('p-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        document.getElementById('play-btn').onclick = () => playBtnToggle();
        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            document.getElementById('time-cur').innerText = fmt(cur);
            document.getElementById('time-dur').innerText = fmt(audio.duration);
            document.getElementById('seek').value = (cur/audio.duration)*100 || 0;

            lyrics.forEach((l, i) => {
                if(cur >= l.t && (!lyrics[i+1] || cur < lyrics[i+1].t)) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const el = document.getElementById(`lrc-${i}`);
                    if(el) {
                        el.classList.add('active');
                        document.getElementById('lyric-content').style.transform = `translateY(${-el.offsetTop + 50}px)`;
                    }
                }
            });
        };

        function fmt(s) { return isNaN(s)?"00:00":Math.floor(s/60).toString().padStart(2,'0')+":"+Math.floor(s%60).toString().padStart(2,'0'); }
        document.getElementById('seek').oninput = (e) => audio.currentTime = (e.target.value/100)*audio.duration;
        document.getElementById('vol').oninput = (e) => audio.volume = e.target.value;

        // 星空背景 (簡化版)
        function initStars() {
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const pts = Array(100).fill().map(() => ({x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()}));
            function anim() {
                ctx.fillStyle = '#050508'; ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = '#fff';
                pts.forEach(p => {
                    p.y -= 0.1; if(p.y<0) p.y=c.height;
                    ctx.globalAlpha = p.s; ctx.fillRect(p.x, p.y, 1, 1);
                });
                requestAnimationFrame(anim);
            }
            anim();
        }
        initStars();
        autoLoad();
    </script>
</body>
</html>
